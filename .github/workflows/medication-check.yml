name: 도토리 약사님 - 복약 알림 체커

on:
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 4 * * *'   # KST 13:00
    - cron: '0 10 * * *'  # KST 19:00
    - cron: '0 12 * * *'  # KST 21:00
  workflow_dispatch:
    inputs:
      test_notification:
        description: '시간 조건 없이 등록된 모든 기기에 테스트 알림을 1개씩 즉시 보냅니다'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 (firebase-admin)
        working-directory: scripts
        run: npm install

      - name: 복약 시간 확인 + 알림 발송
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_NOTIFICATION: ${{ inputs.test_notification }}
        run: node check-medications.js
