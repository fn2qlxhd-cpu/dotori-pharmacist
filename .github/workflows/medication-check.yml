name: 도토리 약사님 - 복약 알림 체커

# ★ schedule(cron) 트리거를 의도적으로 비워둡니다.
#   시간 트리거는 cron-job.org가 GitHub API를 통해 workflow_dispatch로
#   직접 호출합니다. 여기에 schedule을 동시에 두면, GitHub Actions 자체
#   cron과 cron-job.org가 같은 시각에 각각 워크플로우를 실행시켜 같은
#   사람에게 알림이 중복 발송되는 원인이 됩니다.
on:
  workflow_dispatch:
    inputs:
      test_notification:
        description: '시간 조건 없이 등록된 모든 기기에 테스트 알림을 1개씩 즉시 보냅니다'
        type: boolean
        default: false

# ★ concurrency: 같은 그룹의 실행이 겹치면 "이전 실행을 취소"하지 않고
#   "끝날 때까지 기다렸다가" 다음 실행을 시작합니다.
concurrency:
  group: dotori-medication-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 설치
        working-directory: scripts
        run: npm install

      - name: 복약 시간 확인 + 알림 발송
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_NOTIFICATION: ${{ github.event.inputs.test_notification || 'false' }}
        run: node check-medications.js
