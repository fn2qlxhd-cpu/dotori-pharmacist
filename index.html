<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>도토리 약사님</title>
  <meta name="description" content="아침, 점심, 저녁, 자기전 약 복용을 체크하고 알려주는 앱" />

  <!-- PWA 설정 -->
  <meta name="theme-color" content="#FBF6EE" />
  <link rel="manifest" href="manifest.json" />

  <!-- 아이폰 홈 화면 아이콘 / 설정 -->
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="도토리 약사님" />

  <!-- 안드로이드 아이콘 -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- 폰트: Jua(제목용 둥근 글씨) + Noto Sans KR(본문) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=18" />
</head>
<body>

  <!-- 업데이트 토스트 비활성화: 최종 고정 버전에서는 표시하지 않음 -->

  <div class="app">

    <!-- ═══════════ 상단 고정 영역 ═══════════ -->
    <header class="header">

      <!-- 1행: [캐릭터] [도토리 약사님 + 날짜] -->
      <div class="brand-row">
        <div class="mascot-wrap">
                    <svg id="mascotSvg" class="mood-sleepy" viewBox="0 0 140 158" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M56 118 C50 138, 60 156, 70 144 C80 156, 90 138, 84 118
                   C84 118, 56 118, 56 118 Z" fill="#D7AA83"/>
          <ellipse cx="70" cy="80" rx="57" ry="52" fill="#D7AA83"/>
          <path d="M80 1 C87 -2, 97 3, 93 11 C89 17, 79 15, 76 9 C74 5, 77 2, 80 1 Z" fill="#7C4F38"/>
          <defs>
            <clipPath id="capClip"><path d="M8 56 C6 22, 40 3, 70 3 C100 3, 132 18, 134 52 C135 66, 122 84, 100 89 C80 93, 55 88, 35 82 C18 77, 8 70, 8 56 Z"/></clipPath>
          </defs>
          <path d="M8 56 C6 22, 40 3, 70 3 C100 3, 132 18, 134 52 C135 66, 122 84, 100 89 C80 93, 55 88, 35 82 C18 77, 8 70, 8 56 Z" fill="#7C4F38"/>
          <g clip-path="url(#capClip)" stroke="#9C6D4F" stroke-width="3" fill="none" stroke-linecap="round">
            <path d="M8 30 C50 20, 95 20, 134 33"/>
            <path d="M4 54 C55 43, 98 44, 138 58"/>
            <path d="M10 78 C55 70, 98 72, 132 84"/>
            <path d="M36 2 C28 32, 25 65, 30 92"/>
            <path d="M64 0 C61 32, 58 68, 54 95"/>
            <path d="M93 2 C97 34, 98 70, 96 96"/>
            <path d="M120 12 C124 40, 122 72, 112 92"/>
          </g>
          <ellipse cx="40" cy="98" rx="11" ry="8" fill="#F4825F"/>
          <ellipse cx="98" cy="100" rx="11" ry="8" fill="#F4825F"/>
          <g class="face face-sleepy">
          <path d="M45 98 q7 3 14 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M81 100 q7 3 14 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M64 113 q6 5 12 0" stroke="#4A3728" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-ok">
          <circle cx="52" cy="97" r="4.2" fill="#4A3728"/>
          <circle cx="88" cy="99" r="4.2" fill="#4A3728"/>
          <path d="M62 110 L70 117 L82 105" stroke="#4A3728" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <g class="face face-great">
          <path d="M44 101 q8 -10 16 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M80 103 q8 -10 16 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M57 108 Q70 124 83 108" stroke="#4A3728" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-react-wink">
          <circle cx="88" cy="99" r="4.2" fill="#4A3728"/>
          <path d="M44 99 q8 7 16 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M57 108 Q70 124 83 108" stroke="#4A3728" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-react-heart">
          <path d="M52 98.75 C47.00 95.50 50.00 92.00 52 95.75 C54.00 92.00 57.00 95.50 52 98.75 Z" fill="#E0788A"/>
          <path d="M88 100.75 C83.00 97.50 86.00 94.00 88 97.75 C90.00 94.00 93.00 97.50 88 100.75 Z" fill="#E0788A"/>
          <path d="M62 112 Q70 121 80 111" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-react-star">
          <path d="M52.00 91.50 L50.37 95.37 L46.50 97.00 L50.37 98.63 L52.00 102.50 L53.63 98.63 L57.50 97.00 L53.63 95.37 Z" fill="#F0A857"/>
          <path d="M88.00 93.50 L86.37 97.37 L82.50 99.00 L86.37 100.63 L88.00 104.50 L89.63 100.63 L93.50 99.00 L89.63 97.37 Z" fill="#F0A857"/>
          <path d="M57 108 Q70 124 83 108" stroke="#4A3728" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-react-blush">
          <ellipse cx="40" cy="98" rx="13.5" ry="10" fill="#F4825F" opacity="0.55"/>
          <ellipse cx="98" cy="100" rx="13.5" ry="10" fill="#F4825F" opacity="0.55"/>
          <path d="M44 101 q8 -10 16 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M80 103 q8 -10 16 0" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M57 108 Q70 124 83 108" stroke="#4A3728" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          </g>
          <g class="face face-react-wow">
          <circle cx="52" cy="97" r="6" fill="#4A3728"/>
          <circle cx="88" cy="99" r="6" fill="#4A3728"/>
          <circle cx="54" cy="95" r="1.6" fill="#fff"/>
          <circle cx="90" cy="97" r="1.6" fill="#fff"/>
          <ellipse cx="70" cy="117" rx="7" ry="9" fill="#4A3728"/>
          </g>
          <g class="sparkles">
            <path d="M16 16 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3z" fill="#F0A857"/>
            <path d="M126 10 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5z" fill="#F0A857"/>
            <path d="M130 108 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2z" fill="#F0A857"/>
          </g>
          </svg>
        </div>

        <div class="brand-copy">
          <h1 class="app-title" id="appTitleText">도토리 약사님</h1>
          <p class="date-text" id="dateText">오늘 날짜</p>
        </div>
      </div>

      <!-- 2행: 응원 메시지 — 캐릭터 아래 가로 전체 사용, 길어도 짤리지 않음 -->
      <p id="mascotBubble" class="cheer-message" aria-live="polite">오늘도 건강하세요 🌱</p>

      <!-- 시간대별 색깔로 채워지는 진행 막대 -->
      <div class="progress-row">
        <p class="progress-text">
          오늘 <span class="num" id="doneCount">0</span>/<span id="totalCount">4</span> 완료
        </p>
        <span class="percent-text" id="percentText">0%</span>
      </div>
      <div class="progress-bar-multi" aria-hidden="true">
        <div class="seg seg--morning" data-period="morning"></div>
        <div class="seg seg--lunch"   data-period="lunch"></div>
        <div class="seg seg--dinner"  data-period="dinner"></div>
        <div class="seg seg--night"   data-period="night"></div>
      </div>

      <!-- 알림 권한 배너 — 허용되면 자동으로 숨겨집니다 -->
      <div class="notif-banner" id="notifBanner">
        <p class="notif-text" id="notifText">
          알림을 켜면 매일 약 먹을 시간에 알려드려요
        </p>
        <button class="notif-btn" id="notifBtn">알림 허용하기</button>
      </div>
    </header>

    <!-- ═══════════ 카드 영역 ═══════════ -->
    <main class="cards" id="cardsContainer">
      <!-- JS에서 아침약 / 점심약 / 저녁약 / 자기전약 카드 4개를 생성합니다 -->
    </main>

    <!-- ═══════════ 하단 응원 메시지 ═══════════ -->
    <div class="bottom-message-wrap">
      <p class="bottom-message" id="bottomMessage">오늘도 건강하세요 🌱</p>
    </div>

  </div>

  <script src="firebase-config.js?v=18"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
  <script src="app.js?v=18"></script>
</body>
</html>
